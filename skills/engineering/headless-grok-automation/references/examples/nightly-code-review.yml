# Reference workflow: requires a trusted self-hosted runner with grok and jq preinstalled.
name: Nightly Grok Code Review

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  grok-review:
    runs-on: [self-hosted, linux]
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tools
        run: |
          grok --version
          jq --version

      - name: Run bounded read-only review
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          grok -p '
            Review commits from the last 24 hours for concrete correctness,
            security, performance, and maintainability risks.

            Cite file paths and evidence. Return only JSON with this shape:
            {"critical_issues":[],"suggestions":[],"overall_health":"good|needs_attention|critical"}
          ' \
            --tools 'read_file,grep,list_dir' \
            --disallowed-tools 'run_terminal_cmd,search_replace,write_file,Agent' \
            --max-turns 25 \
            --output-format json \
            --no-auto-update > grok-result.json

          jq -e '.stopReason == "EndTurn" and (.sessionId | type == "string")' grok-result.json
          jq -er '.text' grok-result.json > review.json
          jq -e '
            (.critical_issues | type == "array") and
            (.suggestions | type == "array") and
            (.overall_health | IN("good", "needs_attention", "critical"))
          ' review.json

      - name: Create issue when attention is needed
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          health="$(jq -r '.overall_health' review.json)"
          if [[ "$health" == "good" ]]; then
            echo "No issue created: overall health is good."
            exit 0
          fi

          body_file="$(mktemp)"
          {
            echo '```json'
            jq . review.json
            echo '```'
          } > "$body_file"
          gh issue create \
            --title "Nightly Grok review - $(date +%F)" \
            --body-file "$body_file"

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grok-review-${{ github.run_id }}
          path: |
            grok-result.json
            review.json
          if-no-files-found: warn
          retention-days: 14
