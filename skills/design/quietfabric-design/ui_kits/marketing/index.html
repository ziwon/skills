<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuietFabric — Platform</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="qf-atmos" data-screen-label="Marketing landing / hero">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="../icons.jsx"></script>
<script type="text/babel" src="Heroes.jsx"></script>
<script type="text/babel">
const { useState } = React;
const Icon = window.QFIcon;
const { Hero, HERO_VARIANTS } = window.QFMkt;

const VARIANT_LABELS = [
  ["product", "product overview"], ["exec", "executive"],
  ["architecture", "architecture review"], ["proposal", "technical proposal"],
];

const FEATURES = [
  { ic: "network", h: "Node-link topology", p: "Thin route lines and quiet glowing nodes describe how signal moves through the fabric." },
  { ic: "layers", h: "Layered surfaces", p: "Carbon-like hierarchy keeps dense GPU, network, and storage context readable at a glance." },
  { ic: "terminal", h: "Terminal truth", p: "Mono surfaces for logs, command output, and resource IDs — technical facts stay verbatim." },
  { ic: "activity", h: "Live observability", p: "TTFT, throughput, and queue depth as first-class metric tiles, not afterthoughts." },
  { ic: "shield", h: "Operated for years", p: "A control plane that feels like it has been running reliably, because the patterns have." },
  { ic: "route", h: "Route scheduling", p: "Rail-optimized placement keeps collectives on the high-bandwidth domain, end to end." },
];

function App() {
  const [variant, setVariant] = useState("product");
  const [theme, setTheme] = useState("dark");
  const toggle = () => { const t = theme === "dark" ? "light" : "dark"; setTheme(t); document.documentElement.setAttribute("data-theme", t); };

  return (
    <div className="site">
      <nav className="nav">
        <div className="brand">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
            <line x1="7" y1="9" x2="20" y2="9" stroke="#33405A" strokeWidth="1.5"/><line x1="20" y1="9" x2="13" y2="23" stroke="#33405A" strokeWidth="1.5"/>
            <circle cx="7" cy="9" r="3" fill="#6E8BFF"/><circle cx="20" cy="9" r="3" fill="#53D0C5"/><circle cx="13" cy="23" r="3" fill="#8B6DFF"/>
          </svg>
          QuietFabric
        </div>
        <div className="links"><a href="#">Platform</a><a href="#">Topology</a><a href="#">Observability</a><a href="#">Docs</a><a href="#">Pricing</a></div>
        <span className="grow"></span>
        <button className="btn btn-ghost" onClick={toggle} style={{fontFamily:"var(--font-mono)",fontSize:12}}>{theme}</button>
        <a className="btn btn-secondary" href="#">Sign in</a>
        <a className="btn btn-primary" href="#">Get access</a>
      </nav>

      <div style={{paddingTop:36}}>
        <div className="switch">
          {VARIANT_LABELS.map(([k, lb]) => (
            <button key={k} className={variant === k ? "active" : ""} onClick={() => setVariant(k)}>{lb}</button>
          ))}
        </div>
      </div>
      <Hero v={HERO_VARIANTS[variant]} />

      <section className="section">
        <div className="sh"><span className="n">01</span><div><div className="t">A calm control plane</div><div className="d">First-class primitives for AI infrastructure — not a generic component library.</div></div></div>
        <div className="features">
          {FEATURES.map((f, i) => (
            <div className="fcard" key={i}>
              <div className="ico"><Icon name={f.ic} size={20} color="var(--quiet-cyan)" /></div>
              <h4>{f.h}</h4><p>{f.p}</p>
            </div>
          ))}
        </div>
      </section>

      <footer className="foot">
        <span className="tag">Invisible systems. Visible intelligence.</span>
        <span className="meta">QuietFabric · alpha</span>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
